name: Test Git Info Grabber

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  check-info:
    runs-on: ubuntu-latest
    steps:
      # 【ココを修正！】fetch-depth: 0 を追加して、過去の歴史をすべて取得する
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0 # ★これを入れることで、ブランチ同士の比較ができるようになります！

      # 2. PRの「タイトル」と「説明文」をログに表示してみる
      - name: Show PR Title and Body
        run: |
          echo "=== 📥 PRのタイトル ==="
          echo "${{ github.event.pull_request.title }}"
          echo "=== 📥 PRの説明文 ==="
          echo "${{ github.event.pull_request.body }}"

      # 3. リポジトリ内にある「元の仕様書（docs/spec.md）」の中身をログに表示してみる
      - name: Show Original Spec
        run: |
          echo "=== 📥 元の仕様書（docs/spec.md） ==="
          if [ -f "docs/spec.md" ]; then
            cat docs/spec.md
          else
            echo "エラー: docs/spec.md がまだリポジトリ内に存在しません。"
          fi

      # 4. コードの「差分（Diff）」を抽出してログに表示してみる
      # （※ブランチ名が「master」のようでしたので、github.base_ref に自動で合わせる記述にしています）
      - name: Show Git Diff
        run: |
          echo "=== 📥 ソースコードの差分（Diff） ==="
          git diff origin/${{ github.base_ref }}...HEAD
